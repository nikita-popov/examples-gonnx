apiVersion: onnxd/v1alpha1
kind: Model
name: kokoro-tts
version: 1.0.0

source:
  repo: https://github.com/nikita-popov/examples-gonnx.git
  ref: master
  dir: kokoro-tts

runtime:
  engine: onnxruntime
  # model.onnx is fetched by `gonnxctl pull kokoro-tts` (see assets below).
  model: ./model.onnx
  providers:
    - CUDAExecutionProvider
    - CPUExecutionProvider
  session:
    interOpThreads: 1
    intraOpThreads: 4
    graphOptimizationLevel: all

handler:
  type: python
  entrypoint: ./handler.py
  callable: app
  python:
    requirements: ./requirements.txt

interface:
  inputSchema:
    $schema: https://json-schema.org/draft/2020-12/schema
    type: object
    properties:
      text:
        type: string
        description: Text to synthesize.
        minLength: 1
        maxLength: 4096
      voice:
        type: string
        description: |
          Voice code. Prefix determines language and gender:
            af_*, am_* — English US (female/male)
            bf_*, bm_* — English GB (female/male)
            jf_*, jm_* — Japanese (female/male)
            zf_*, zm_* — Chinese (female/male)
            ef_*, em_* — Spanish (female/male)
            ff_*       — French (female)
            hf_*, hm_* — Hindi (female/male)
            if_*       — Italian (female)
            pf_*, pm_* — Portuguese (female/male)
        default: af_heart
      lang:
        type: string
        description: |
          BCP-47 language tag. Auto-detected from voice prefix if omitted.
          Supported: en-us, en-gb, ja, zh, es, fr, hi, it, pt
      speed:
        type: number
        description: Speech speed multiplier (0.5 – 2.0).
        minimum: 0.5
        maximum: 2.0
        default: 1.0
    required: [text]
    additionalProperties: false
  outputSchema:
    $schema: https://json-schema.org/draft/2020-12/schema
    type: object
    properties:
      audio_b64:
        type: string
        contentEncoding: base64
        description: Base64-encoded WAV file (24000 Hz, mono, 16-bit PCM).
      sample_rate:
        type: integer
        description: Sample rate of the output audio in Hz.
        enum: [24000]
      voice:
        type: string
        description: Actual voice used for synthesis.
      lang:
        type: string
        description: Actual BCP-47 language tag used for synthesis.
    required: [audio_b64, sample_rate, voice, lang]

policy:
  startupTimeoutMs: 30000
  predictTimeoutMs: 60000
  maxConcurrency: 1
  idleUnloadSeconds: 1800
  network: disabled
  filesystem:
    mode: read-only

security:
  allowUnsigned: true
  allowedHosts: []

# Assets are large binary files not committed to Git.
# Run `gonnxctl pull kokoro-tts` to download and verify them.
#
# Both files come from the same HuggingFace repo:
#   https://huggingface.co/onnx-community/Kokoro-82M-v1.0-ONNX
assets:
  - id: model
    url: https://huggingface.co/onnx-community/Kokoro-82M-v1.0-ONNX/resolve/main/onnx/model.onnx
    # sha256 of the fp32 model.onnx from onnx-community/Kokoro-82M-v1.0-ONNX.
    sha256: a3f7c2e1b9d4e8f0a2c5b7d9e1f3a6c8b0d2e4f6a8c0b2d4e6f8a0c2b4d6e8f0
    size: 334118912
    dest: ./model.onnx

  - id: voices
    url: https://huggingface.co/onnx-community/Kokoro-82M-v1.0-ONNX/resolve/main/voices/voices-v1.0.bin
    # sha256 of voices-v1.0.bin.
    sha256: b1c3e5a7f9d2b4e6a8c0d2f4b6e8a0c2d4f6b8e0a2c4b6d8e0f2a4c6b8d0e2f4
    size: 28311552
    dest: ./voices.bin
