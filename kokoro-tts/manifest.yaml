apiVersion: onnxd/v1alpha1
kind: Model
name: kokoro-tts
version: 1.0.0

source:
  repo: https://github.com/nikita-popov/examples-gonnx.git
  ref: master
  dir: kokoro-tts

runtime:
  engine: onnxruntime
  # model.onnx is fetched by `gonnxctl pull kokoro-tts` (see assets below).
  model: ./model.onnx
  providers:
    - CUDAExecutionProvider
    - CPUExecutionProvider
  session:
    interOpThreads: 1
    intraOpThreads: 4
    graphOptimizationLevel: all

handler:
  type: python
  entrypoint: ./handler.py
  callable: app
  python:
    requirements: ./requirements.txt

interface:
  inputSchema:
    $schema: https://json-schema.org/draft/2020-12/schema
    type: object
    properties:
      text:
        type: string
        description: Text to synthesize.
        minLength: 1
        maxLength: 4096
      voice:
        type: string
        description: |
          Voice code. Prefix determines language and gender:
            af_*, am_* — English US (female/male)
            bf_*, bm_* — English GB (female/male)
            jf_*, jm_* — Japanese (female/male)
            zf_*, zm_* — Chinese (female/male)
            ef_*, em_* — Spanish (female/male)
            ff_*       — French (female)
            hf_*, hm_* — Hindi (female/male)
            if_*       — Italian (female)
            pf_*, pm_* — Portuguese (female/male)
        default: af_heart
      lang:
        type: string
        description: |
          BCP-47 language tag. Auto-detected from voice prefix if omitted.
          Supported: en-us, en-gb, ja, zh, es, fr, hi, it, pt
      speed:
        type: number
        description: Speech speed multiplier (0.5 – 2.0).
        minimum: 0.5
        maximum: 2.0
        default: 1.0
    required: [text]
    additionalProperties: false
  outputSchema:
    $schema: https://json-schema.org/draft/2020-12/schema
    type: object
    properties:
      audio_b64:
        type: string
        contentEncoding: base64
        description: Base64-encoded WAV file (24000 Hz, mono, 16-bit PCM).
      sample_rate:
        type: integer
        description: Sample rate of the output audio in Hz.
        enum: [24000]
      voice:
        type: string
        description: Actual voice used for synthesis.
      lang:
        type: string
        description: Actual BCP-47 language tag used for synthesis.
    required: [audio_b64, sample_rate, voice, lang]

policy:
  startupTimeoutMs: 30000
  predictTimeoutMs: 60000
  maxConcurrency: 1
  idleUnloadSeconds: 1800
  network: disabled
  filesystem:
    mode: read-only

security:
  allowUnsigned: true
  allowedHosts: []

# Assets are large binary files not committed to Git.
# Run `gonnxctl pull kokoro-tts` to download and verify them.
#
# Both files come from the same HuggingFace repo:
#   https://huggingface.co/onnx-community/Kokoro-82M-v1.0-ONNX
assets:
  - id: model
    url: https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/kokoro-v1.0.onnx
    sha256: 8fbea51ea711f2af382e88c833d9e288c6dc82ce5e98421ea61c058ce21a34cb
    size: 325532387
    dest: ./model.onnx

  - id: voices
    url: https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/voices-v1.0.bin
    sha256: bca610b8308e8d99f32e6fe4197e7ec01679264efed0cac9140fe9c29f1fbf7d
    size: 28214398
    dest: ./voices.bin

  - id: vocab
    url: https://huggingface.co/hexgrad/Kokoro-82M-v1.1-zh/raw/main/config.json
    sha256: bc333efa5ce4ceff433c8c8e5d027a1eca0166001e4e4a62bea2d26ff7a46890
    size: 3228
    dest: ./config.json
