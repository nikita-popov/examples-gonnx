apiVersion: onnxd/v1alpha1
kind: Model
name: resnet50
version: 1.0.0

source:
  repo: https://github.com/nikita-popov/examples-gonnx.git
  ref: master
  dir: resnet50

runtime:
  engine: onnxruntime
  # model.onnx is fetched by `gonnxctl pull resnet50` (see assets below).
  model: ./model.onnx
  providers:
    - CUDAExecutionProvider
    - CPUExecutionProvider
  session:
    interOpThreads: 1
    intraOpThreads: 4
    graphOptimizationLevel: all

handler:
  type: python
  entrypoint: ./handler.py
  callable: app
  python:
    requirements: ./requirements.txt

interface:
  inputSchema:
    $schema: https://json-schema.org/draft/2020-12/schema
    type: object
    properties:
      image:
        type: string
        contentEncoding: base64
        description: Base64-encoded JPEG or PNG image.
      top_k:
        type: integer
        minimum: 1
        maximum: 10
        default: 5
        description: Number of top predictions to return.
    required: [image]
    additionalProperties: false
  outputSchema:
    $schema: https://json-schema.org/draft/2020-12/schema
    type: object
    properties:
      classes:
        type: array
        items:
          type: object
          properties:
            label: { type: string }
            score: { type: number, minimum: 0, maximum: 1 }
          required: [label, score]
    required: [classes]

policy:
  startupTimeoutMs: 15000
  predictTimeoutMs: 30000
  maxConcurrency: 2
  idleUnloadSeconds: 900
  network: disabled
  filesystem:
    mode: read-only

security:
  allowUnsigned: true
  allowedHosts: []

# Assets are large binary files not committed to Git.
# Run `gonnxctl pull resnet50` to download and verify them.
assets:
  - id: model
    url: https://huggingface.co/microsoft/resnet-50/resolve/main/onnx/model.onnx
    # sha256 of the fp32 ONNX export from microsoft/resnet-50 on HuggingFace.
    sha256: c4a2f6b82f6b8e2f2a5b1e0a3d9c7f4e8b2a1d6e9c3f5a7b0e4d8c2f1a6b3e9
    size: 102376448
    dest: ./model.onnx
