apiVersion: onnxd/v1alpha1
kind: Model
name: resnet50
version: 1.0.0

source:
  repo: https://github.com/nikita-popov/examples-gonnx.git
  ref: master
  dir: resnet50

runtime:
  engine: onnxruntime
  model: ./model.onnx
  providers:
    - CUDAExecutionProvider
    - CPUExecutionProvider
  session:
    interOpThreads: 1
    intraOpThreads: 4
    graphOptimizationLevel: all

handler:
  type: python
  entrypoint: ./handler.py
  callable: app
  python:
    requirements: ./requirements.txt

interface:
  inputSchema:
    $schema: https://json-schema.org/draft/2020-12/schema
    type: object
    properties:
      image:
        type: string
        contentEncoding: base64
        description: Base64-encoded JPEG or PNG image
      top_k:
        type: integer
        minimum: 1
        maximum: 10
        default: 5
    required: [image]
  outputSchema:
    $schema: https://json-schema.org/draft/2020-12/schema
    type: object
    properties:
      classes:
        type: array
        items:
          type: object
          properties:
            label: { type: string }
            score: { type: number, minimum: 0, maximum: 1 }

policy:
  startupTimeoutMs: 15000
  predictTimeoutMs: 30000
  maxConcurrency: 2
  idleUnloadSeconds: 900
  network: disabled
  filesystem:
    mode: read-only

security:
  allowUnsigned: true
  allowedHosts: []
