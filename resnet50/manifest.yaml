apiVersion: onnxd/v1alpha1
kind: Model
name: resnet50
version: 1.0.0

source:
  repo: https://github.com/nikita-popov/examples-gonnx.git
  ref: master
  dir: resnet50

runtime:
  engine: onnxruntime
  model: ./model.onnx
  providers:
    - CUDAExecutionProvider
    - CPUExecutionProvider
  session:
    interOpThreads: 1
    intraOpThreads: 4
    graphOptimizationLevel: all

handler:
  type: python
  entrypoint: ./handler.py
  callable: app
  python:
    requirements: ./requirements.txt

interface:
  inputSchema:
    $schema: https://json-schema.org/draft/2020-12/schema
    type: object
    properties:
      image:
        type: string
        contentEncoding: base64
        description: Base64-encoded JPEG or PNG image.
      top_k:
        type: integer
        minimum: 1
        maximum: 10
        default: 5
        description: Number of top predictions to return.
    required: [image]
    additionalProperties: false
  outputSchema:
    $schema: https://json-schema.org/draft/2020-12/schema
    type: object
    properties:
      classes:
        type: array
        items:
          type: object
          properties:
            label: { type: string }
            score: { type: number, minimum: 0, maximum: 1 }
          required: [label, score]
    required: [classes]

policy:
  startupTimeoutMs: 15000
  predictTimeoutMs: 30000
  maxConcurrency: 2
  idleUnloadSeconds: 900
  network: disabled
  filesystem:
    mode: read-only

security:
  allowUnsigned: true
  allowedHosts: []

assets:
  - id: model
    url: https://github.com/onnx/models/raw/main/validated/vision/classification/resnet/model/resnet50-v1-12.onnx
    sha256: 3f03fdef724b22947eed826f1eef1dc5c34151bb4c37d634f1db89dfa2dd1526
    size: 102576593
    dest: ./model.onnx
  - id: labels
    url: https://raw.githubusercontent.com/onnx/models/main/validated/vision/classification/synset.txt
    dest: ./assets/labels.txt
